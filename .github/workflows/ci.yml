name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: Unit (Perl ${{ matrix.perl }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 5.14 is the supported minimum; 5.38 and latest cover modern installs.
        perl: ['5.14', '5.38', 'latest']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Perl ${{ matrix.perl }}
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}

      - name: Cache CPAN modules
        uses: actions/cache@v6
        with:
          path: |
            ~/perl5
            local
          key: ${{ runner.os }}-perl-${{ matrix.perl }}-${{ hashFiles('Makefile.PL') }}
          restore-keys: ${{ runner.os }}-perl-${{ matrix.perl }}-

      - name: Syntax check
        run: perl -c lib/MongrelDB.pm

      - name: Run unit tests
        run: perl -Ilib t/json_test.t

  live:
    # The layer that catches client/server contract drift. Downloads a
    # mongreldb-server binary, starts it, and runs the live round-trip suite.
    name: Live integration (against mongreldb-server)
    runs-on: ubuntu-latest
    env:
      MONGRELDB_URL: http://127.0.0.1:8453
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.38'

      - name: Cache mongreldb-server binary
        uses: actions/cache@v6
        id: server-cache
        with:
          path: /tmp/mongreldb-server
          key: mongreldb-server-${{ runner.os }}-0.50.0

      - name: Download mongreldb-server
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: |
          curl -fL -o /tmp/mongreldb-server \
            https://github.com/visorcraft/MongrelDB/releases/download/v0.50.0/mongreldb-server-linux-x64
          chmod +x /tmp/mongreldb-server

      - name: Start mongreldb-server
        run: |
          rm -rf /tmp/mongreldb-data
          /tmp/mongreldb-server /tmp/mongreldb-data --port 8453 > /tmp/mongreldb-server.log 2>&1 &
          echo $! > /tmp/mongreldb-server.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server.log && exit 1)

      - name: Run live tests
        env:
          MONGRELDB_URL: http://127.0.0.1:8453
        run: perl -Ilib t/live_test.t

      - name: Run examples
        env:
          MONGRELDB_URL: http://127.0.0.1:8453
        run: |
          for ex in examples/*.pl; do
            echo "=== Running $ex ==="
            perl -Ilib "$ex" || { echo "FAILED: $ex"; exit 1; }
          done

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/mongreldb-server.log

      - name: Stop mongreldb-server
        if: always()
        run: |
          if [ -f /tmp/mongreldb-server.pid ]; then
            kill "$(cat /tmp/mongreldb-server.pid)" 2>/dev/null || true
          fi
